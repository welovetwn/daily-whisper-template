
<!DOCTYPE html>
<html lang='zh-Hant'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Daily Whisper</title>
<link rel='stylesheet' href='css/style.css'>
<link rel='manifest' href='manifest.json'>
<!-- Google Fonts Sriracha -->
<link href='https://fonts.googleapis.com/css2?family=Sriracha&display=swap' rel='stylesheet'>
<!-- Google Fonts Chiron GoRound TC -->
<link rel='preconnect' href='https://fonts.googleapis.com'>
<link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
<link href='https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@400;700&display=swap' rel='stylesheet'>
<style>
/* 芫荽體 */
@font-face {
  font-family: "Iansui";
  src: url(https://cdn.jsdelivr.net/gh/tadlearn/webfonts/Iansui.woff2) format("woff2");
}
</style>
</head>
<body>
<!-- Splash Screen -->
<div id='splash' style='position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity 0.5s;'>
  <div style="font-family: 'Sriracha', cursive; font-size: 32px; color: #fff; margin-bottom: 20px;">Daily Whisper🕯️</div>
  <div style='width:40px;height:40px;border:3px solid #333;border-top:3px solid #fff;border-radius:50%;animation:spin 1s linear infinite;'></div>
  <div style="font-family: 'Chiron GoRound TC', sans-serif; color: #666; margin-top: 20px; font-size: 14px;">載入中...</div>
</div>
<style>
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<!-- 預加載芫荽體 -->
<span style="font-family: 'Iansui', sans-serif; position: absolute; visibility: hidden;">預載</span>
<!-- 預加載 Sriracha -->
<span style="font-family: 'Sriracha', cursive; position: absolute; visibility: hidden;">preload</span>
<!-- 預加載 Chiron GoRound TC -->
<span style="font-family: 'Chiron GoRound TC', sans-serif; position: absolute; visibility: hidden;">預載</span>
<div class='logo' style="font-family: 'Sriracha', cursive; font-size: 28px;">Daily Whisper🕯️</div>
<div class='controls'>
  <div class='btn' onclick='nextSlide()'>↓</div>
  <div class='btn' onclick='shareImage()'>📤</div>
  <a href='tags.html' class='btn' style='text-decoration:none'>🏷️</a>
  <div class='btn' onclick='changeBackground()' style='font-size:14px'>🖼️</div>
  <div class='btn' onclick='clearCacheAndReload()' style='font-size:12px'>🔄</div>
</div>
<div class='container' id='container'></div>
<script src='js/app.js'></script>
</body>
</html>
