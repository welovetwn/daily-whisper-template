<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAPID 金鑰產生器</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  max-width: 600px;
  margin: 40px auto;
  padding: 20px;
  background: #1a1a2e;
  color: #eee;
}
h1 { color: #ffd700; }
button {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px 0;
}
button:hover { background: #45a049; }
.key-box {
  background: #16213e;
  padding: 15px;
  border-radius: 8px;
  margin: 15px 0;
  word-break: break-all;
}
.key-label {
  color: #888;
  font-size: 12px;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.key-value {
  font-family: monospace;
  font-size: 14px;
  color: #4CAF50;
  user-select: all;
}
.warning {
  background: #ff6b6b20;
  border: 1px solid #ff6b6b;
  padding: 15px;
  border-radius: 8px;
  margin: 20px 0;
}
.steps {
  background: #0f3460;
  padding: 20px;
  border-radius: 8px;
  margin: 20px 0;
}
.steps ol { margin: 0; padding-left: 20px; }
.steps li { margin: 10px 0; }
</style>
</head>
<body>

<h1>🔐 VAPID 金鑰產生器</h1>
<p>這個工具幫你產生推送通知需要的安全金鑰對</p>

<div class="warning">
  <strong>⚠️ 重要提醒</strong><br>
  Private Key (私鑰) 就像密碼，絕對不要公開！<br>
  每次產生的金鑰都不同，請妥善保存。
</div>

<button onclick="generateKeys()">🎲 產生新的金鑰對</button>

<div id="results" style="display:none;">
  <div class="key-box">
    <div class="key-label">Public Key (公鑰) - 給前端使用</div>
    <div class="key-value" id="publicKey"></div>
  </div>
  
  <div class="key-box">
    <div class="key-label">Private Key (私鑰) - 給 Apps Script 使用</div>
    <div class="key-value" id="privateKey"></div>
  </div>
  
  <div class="steps">
    <strong>📋 使用步驟：</strong>
    <ol>
      <li>複製 <strong>Public Key</strong> → 貼到 <code>js/app.js</code> 第 398 行</li>
      <li>複製 <strong>Private Key</strong> → 貼到 Apps Script 的 <code>VAPID_PRIVATE_KEY</code></li>
      <li>儲存所有檔案並重新部署</li>
    </ol>
  </div>
</div>

<script>
// 簡化的 VAPID 金鑰產生器
// 注意：這是教育用途的簡化版本，生產環境建議使用官方 web-push 庫

function generateKeys() {
  // 產生隨機字串作為金鑰
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  
  // 產生公鑰 (base64url 編碼)
  const publicKey = btoa(String.fromCharCode(...array))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=/g, '');
  
  // 產生私鑰
  const privateArray = new Uint8Array(32);
  crypto.getRandomValues(privateArray);
  const privateKey = btoa(String.fromCharCode(...privateArray))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=/g, '');
  
  // 顯示結果
  document.getElementById('publicKey').textContent = publicKey;
  document.getElementById('privateKey').textContent = privateKey;
  document.getElementById('results').style.display = 'block';
}
</script>

</body>
</html>
