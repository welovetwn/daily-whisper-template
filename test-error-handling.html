<!DOCTYPE html>
<html lang='zh-Hant'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>測試錯誤處理 - Daily Whisper</title>
<style>
body { 
  padding: 20px; 
  background: #111; 
  color: #fff; 
  font-family: sans-serif;
}
.test-btn { 
  display: block; 
  width: 100%; 
  max-width: 400px;
  margin: 10px 0; 
  padding: 15px; 
  background: #333; 
  color: #fff; 
  border: none; 
  border-radius: 4px; 
  cursor: pointer;
  font-size: 16px;
}
.test-btn:hover { background: #444; }
.result { 
  margin: 10px 0; 
  padding: 15px; 
  background: #222; 
  border-radius: 4px;
  font-family: monospace;
  font-size: 14px;
}
.success { border-left: 3px solid #4CAF50; }
.error { border-left: 3px solid #f44336; }
.back { color: #fff; text-decoration: none; margin-bottom: 20px; display: inline-block; }
</style>
</head>
<body>
<a href='index.html' class='back'>← 返回</a>
<h2>測試錯誤處理功能</h2>
<p>點擊以下按鈕測試各種錯誤情境：</p>

<button class='test-btn' onclick='testLoadQuotesError()'>測試 1: loadQuotes 網路錯誤</button>
<div id='test1' class='result'></div>

<button class='test-btn' onclick='testShareImageNoQuote()'>測試 2: shareImage 無語錄</button>
<div id='test2' class='result'></div>

<button class='test-btn' onclick='testCreateSlidesInvalid()'>測試 3: createSlides 無效資料</button>
<div id='test3' class='result'></div>

<script>
// 測試 1: loadQuotes 錯誤處理
async function testLoadQuotesError() {
  const resultDiv = document.getElementById('test1');
  resultDiv.textContent = '測試中...';
  resultDiv.className = 'result';
  
  try {
    // 模擬錯誤的 URL
    const testUrl = 'https://invalid-url-that-will-fail.com/test.json';
    const res = await fetch(testUrl);
    
    if (!res.ok) {
      throw new Error('Network response was not ok: ' + res.status);
    }
    
    const data = await res.json();
    resultDiv.textContent = '✗ 不應該成功';
    resultDiv.className = 'result error';
  } catch (error) {
    resultDiv.innerHTML = `✓ 正確捕捉錯誤<br>錯誤訊息: ${error.message}`;
    resultDiv.className = 'result success';
  }
}

// 測試 2: shareImage 無語錄時的檢查
function testShareImageNoQuote() {
  const resultDiv = document.getElementById('test2');
  resultDiv.textContent = '測試中...';
  resultDiv.className = 'result';
  
  // 模擬 shareImage 的檢查邏輯
  const q = null; // 無語錄
  
  if (!q) {
    resultDiv.innerHTML = `✓ 正確檢測無語錄<br>錯誤提示: 請先選擇一個語錄`;
    resultDiv.className = 'result success';
    return;
  }
  
  resultDiv.textContent = '✗ 未檢測到錯誤';
  resultDiv.className = 'result error';
}

// 測試 3: createSlides 資料驗證
function testCreateSlidesInvalid() {
  const resultDiv = document.getElementById('test3');
  resultDiv.textContent = '測試中...';
  resultDiv.className = 'result';
  
  // 測試各種無效資料
  const tests = [
    { input: null, expected: false, desc: 'null' },
    { input: undefined, expected: false, desc: 'undefined' },
    { input: 'string', expected: false, desc: '字串' },
    { input: {}, expected: false, desc: '物件（非陣列）' },
    { input: [], expected: false, desc: '空陣列' },
    { input: [{ text: 'test' }], expected: true, desc: '有效陣列' }
  ];
  
  let results = [];
  tests.forEach(test => {
    const isValid = Array.isArray(test.input) && test.input.length > 0;
    const pass = isValid === test.expected;
    results.push(`${pass ? '✓' : '✗'} ${test.desc}: ${isValid ? '有效' : '無效'}`);
  });
  
  const allPass = !results.some(r => r.startsWith('✗'));
  resultDiv.innerHTML = results.join('<br>');
  resultDiv.className = allPass ? 'result success' : 'result error';
}
</script>
</body>
</html>
